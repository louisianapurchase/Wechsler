name: Deploy with Secure Config

on:
  push:
    branches: [ main, master ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3
    
    - name: Inject secrets into config
      run: |
        sed -i 's|###FIREBASE_API_KEY###|${{ secrets.FIREBASE_API_KEY }}|g' js/config.js
        sed -i 's|###FIREBASE_AUTH_DOMAIN###|${{ secrets.FIREBASE_AUTH_DOMAIN }}|g' js/config.js
        sed -i 's|###FIREBASE_PROJECT_ID###|${{ secrets.FIREBASE_PROJECT_ID }}|g' js/config.js
        sed -i 's|###FIREBASE_STORAGE_BUCKET###|${{ secrets.FIREBASE_STORAGE_BUCKET }}|g' js/config.js
        sed -i 's|###FIREBASE_MESSAGING_SENDER_ID###|${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}|g' js/config.js
        sed -i 's|###FIREBASE_APP_ID###|${{ secrets.FIREBASE_APP_ID }}|g' js/config.js
        sed -i 's|###FIREBASE_MEASUREMENT_ID###|${{ secrets.FIREBASE_MEASUREMENT_ID }}|g' js/config.js
    
    - name: Deploy to GitHub Pages
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./
        cname: mountainliontech.com  # Update with your domain if you have one
